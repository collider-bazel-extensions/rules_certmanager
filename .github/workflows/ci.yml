name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    name: bazel test (ubuntu-latest, analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: bazel build //...
        run: bazel build //...

      - name: bazel test (analysis only)
        # Smoke test (//tests:smoke_test) is `manual` — it stands up a kind
        # cluster, applies cert-manager, and mints a Certificate. Needs
        # Docker on the runner. This CI run validates the rule library +
        # the smoke test composition build, then runs analysis tests only.
        run: bazel test //... --test_tag_filters=-manual --test_output=errors

      - name: Smoke test composition builds
        run: bazel build //tests:smoke_test

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs
          path: bazel-testlogs/
          if-no-files-found: ignore
